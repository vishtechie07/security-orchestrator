services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - security.sandbox.base-path=/tmp/security-sandbox
      - audit.rate-limit.max-per-minute=10
      - audit.clone-timeout-seconds=300
      - DOCKER_SANDBOX_VOLUME=securityorchestrator_security-sandbox
    volumes:
      - security-sandbox:/tmp/security-sandbox
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  security-sandbox:
    name: securityorchestrator_security-sandbox
